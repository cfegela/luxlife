<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Todo List</h1>
    </header>

    <div class="add-todo-form">
      <h2>Add New Todo</h2>
      <form id="todoForm">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" required placeholder="Enter todo title">
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3" placeholder="Enter description (optional)"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Add Todo</button>
      </form>
    </div>

    <div class="todos-section">
      <h2>My Todos</h2>
      <div id="todosList" class="todos-list">
        <p class="loading">Loading todos...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
